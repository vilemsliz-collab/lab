<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sphere Carousel — Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #f0eeeb;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #cv { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

    /* ── UI chrome ────────────────────────────────── */
    .ui {
      position: fixed; z-index: 20;
      font-family: 'IBM Plex Mono', monospace;
      pointer-events: none;
    }
    .back {
      top: 24px; left: 32px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #aaa; text-decoration: none;
      pointer-events: all;
      transition: color 0.2s;
    }
    .back:hover { color: #333; }
    .info { bottom: 32px; left: 32px; }
    .info-title {
      font-size: 13px; font-weight: 500; color: #222;
      margin-bottom: 4px;
      transition: opacity 0.3s;
    }
    .info-counter { font-size: 11px; color: #aaa; letter-spacing: 0.08em; }
    .hint {
      bottom: 32px; right: 32px;
      font-size: 11px; color: #bbb; letter-spacing: 0.06em;
      transition: opacity 1.4s ease;
    }
    .hint.gone { opacity: 0; }

    /* ── CSS 3D fallback ──────────────────────────── */
    #fb {
      display: none;
      position: fixed; inset: 0;
      background: #f0eeeb;
      perspective: 1100px;
      perspective-origin: 50% 50%;
    }
    #fb.on { display: block; }
    .fbc {
      position: absolute;
      top: 50%; left: 50%;
      width: 180px; height: 240px;
      margin: -120px -90px;
      border-radius: 14px;
      display: flex; flex-direction: column;
      padding: 20px;
      font-family: 'IBM Plex Mono', monospace;
      transition: transform 0.58s cubic-bezier(0.22,1,0.36,1), opacity 0.58s ease;
      cursor: default;
    }
    /* Positions mimic left/right/back of sphere */
    .fbc[data-o="0"] { transform: none; opacity: 1; cursor: pointer; z-index: 5; }
    .fbc[data-o="1"] { transform: translateX(240px) translateZ(-90px)  rotateY(28deg)  scale(0.76); opacity: 0.72; }
    .fbc[data-o="2"] { transform: translateX(-240px) translateZ(-90px) rotateY(-28deg) scale(0.76); opacity: 0.72; }
    .fbc[data-o="3"] { transform: translateX(330px) translateZ(-190px)  rotateY(38deg) scale(0.56); opacity: 0.40; }
    .fbc[data-o="4"] { transform: translateX(-330px) translateZ(-190px) rotateY(-38deg) scale(0.56); opacity: 0.40; }
    .fbc-id    { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
    .fbc-spacer { flex: 1; }
    .fbc-title { font-size: 20px; font-weight: 500; color: #f0eeeb; line-height: 1.1; }
    .fbc-sub   { font-size: 12px; color: rgba(255,255,255,0.5); font-style: italic; margin-top: 5px; }
    .fbc-tag   { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; }
  </style>
</head>
<body>

  <a class="ui back" href="./index.html">← lab</a>
  <div class="ui info">
    <div class="info-title"   id="info-title">Ink Text</div>
    <div class="info-counter" id="info-counter">01 / 05</div>
  </div>
  <div class="ui hint" id="hint">drag to explore</div>

  <canvas id="cv"></canvas>
  <div id="fb"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
  (() => {
    'use strict';

    /* ── Card data ──────────────────────────────────── */
    const CARDS = [
      { id:'001', title:'Ink Text',  sub:'typographic', tag:'2025-03', href:'./ink-text/',    bg:'#12131a', ac:'#c8ff00' },
      { id:'002', title:'Orbs v5',   sub:'generative',  tag:'2025-03', href:'./orbs-v5.html', bg:'#080e1c', ac:'#4dd0e1' },
      { id:'003', title:'Signal',    sub:'audio viz',   tag:'wip',     href:null,             bg:'#1e0a0a', ac:'#ff5252' },
      { id:'004', title:'Terrain',   sub:'procedural',  tag:'wip',     href:null,             bg:'#071207', ac:'#66ff99' },
      { id:'005', title:'Fluid',     sub:'simulation',  tag:'planned', href:null,             bg:'#141414', ac:'#e0e0e0' },
    ];
    const N = CARDS.length;

    /* ── UI refs ───────────────────────────────────── */
    const titleEl   = document.getElementById('info-title');
    const counterEl = document.getElementById('info-counter');
    const hintEl    = document.getElementById('hint');
    let   activeIdx = 0;
    let   hintGone  = false;

    function setActive(i) {
      if (i === activeIdx) return;
      activeIdx = i;
      titleEl.textContent   = CARDS[i].title;
      counterEl.textContent = `${String(i+1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
    }
    function fadeHint() {
      if (!hintGone) { hintGone = true; hintEl.classList.add('gone'); }
    }

    /* ── WebGL detection ──────────────────────────── */
    const hasWebGL = (() => {
      try {
        const c = document.createElement('canvas');
        return !!(window.WebGLRenderingContext &&
                 (c.getContext('webgl') || c.getContext('experimental-webgl')));
      } catch { return false; }
    })();

    /* ── Boot ─────────────────────────────────────── */
    (async () => {
      try {
        await document.fonts.load('500 52px "IBM Plex Mono"');
        await document.fonts.load('italic 18px "IBM Plex Mono"');
      } catch {}
      if (hasWebGL && typeof THREE !== 'undefined') initGL();
      else initCSS();
    })();

    /* ═════════════════════════════════════════════════
       CSS 3D FALLBACK
    ═════════════════════════════════════════════════ */
    function initCSS() {
      document.getElementById('cv').style.display = 'none';
      const fb = document.getElementById('fb');
      fb.classList.add('on');
      let curr = 0;

      // offset → CSS class: 0=front, 1=right, 2=left, 3=far-right, 4=far-left
      function offsetClass(raw) {
        const o = ((raw % N) + N) % N;
        if (o === 0) return 0;
        if (o === 1) return 1;
        if (o === N-1) return 2;
        if (o === 2) return 3;
        if (o === N-2) return 4;
        return -1; // hidden
      }

      function render() {
        fb.innerHTML = '';
        for (let i = 0; i < N; i++) {
          const oc = offsetClass(i - curr);
          if (oc < 0) continue;
          const card = CARDS[i];
          const el = document.createElement('div');
          el.className = 'fbc';
          el.dataset.o = oc;
          el.style.background = card.bg;
          el.style.borderTop = `3px solid ${card.ac}`;
          el.innerHTML = `
            <div class="fbc-id">${card.id}</div>
            <div class="fbc-spacer"></div>
            <div class="fbc-title">${card.title}</div>
            <div class="fbc-sub">${card.sub}</div>
            <div class="fbc-tag">${card.tag}</div>`;
          if (oc === 0 && card.href) el.onclick = () => location.href = card.href;
          fb.appendChild(el);
        }
        titleEl.textContent   = CARDS[curr].title;
        counterEl.textContent = `${String(curr+1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
      }

      function go(dir) {
        fadeHint();
        curr = (curr + dir + N) % N;
        render();
      }

      render();

      // ── Fallback input ──
      let wAcc = 0;
      window.addEventListener('wheel', e => {
        e.preventDefault();
        wAcc += e.deltaY;
        if (Math.abs(wAcc) > 88) { go(wAcc > 0 ? 1 : -1); wAcc = 0; }
      }, { passive: false });

      let ftx = null;
      window.addEventListener('touchstart', e => ftx = e.touches[0].clientX, { passive: true });
      window.addEventListener('touchend',   e => {
        if (ftx === null) return;
        const dx = e.changedTouches[0].clientX - ftx;
        if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
        ftx = null;
      }, { passive: true });

      window.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ') go(1);
        if (e.key === 'ArrowLeft')  go(-1);
      });
    }

    /* ═════════════════════════════════════════════════
       THREE.JS — PHASE 1: Structure
    ═════════════════════════════════════════════════ */
    function initGL() {
      const canvas = document.getElementById('cv');

      const R = new THREE.WebGLRenderer({ canvas, antialias: true });
      R.setPixelRatio(Math.min(devicePixelRatio, 2));
      R.setSize(innerWidth, innerHeight);
      R.setClearColor(0xf0eeeb, 1);

      const scene = new THREE.Scene();

      /* Responsive config */
      function cfg() {
        const a = innerWidth / innerHeight;
        if (a < 0.75) return { r:3.0, z:6.5, fov:58, cw:1.45, ch:1.93 }; // portrait mobile
        if (a < 1.3)  return { r:3.3, z:6.2, fov:54, cw:1.65, ch:2.20 }; // landscape / tablet
        return              { r:3.7, z:6.0, fov:50, cw:1.95, ch:2.60 }; // desktop
      }

      let C = cfg();
      const cam = new THREE.PerspectiveCamera(C.fov, innerWidth / innerHeight, 0.1, 100);
      cam.position.z = C.z;

      /* Sphere group */
      const group = new THREE.Group();
      scene.add(group);

      /* Seeded LCG random — deterministic organic tilts */
      function makeRng(seed) {
        let s = seed | 0;
        return () => {
          s = (Math.imul(s, 1664525) + 1013904223) | 0;
          return (s >>> 0) / 0xffffffff;
        };
      }

      /* Fibonacci sphere — even surface distribution */
      function fibSphere(n, radius) {
        const pts = [], phi = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < n; i++) {
          const y = 1 - (i / (n - 1)) * 2;
          const r = Math.sqrt(Math.max(0, 1 - y * y));
          const theta = phi * i;
          pts.push(
            new THREE.Vector3(Math.cos(theta) * r, y, Math.sin(theta) * r)
              .multiplyScalar(radius)
          );
        }
        return pts;
      }

      /* ── Phase 3: Shaders ──────────────────────── */
      const VS = /* glsl */`
        varying vec2  vUv;
        varying float vFacing;
        void main() {
          vUv = uv;
          // World-space normal: card's +Z (face direction) after all transforms
          vec3 wn = normalize((modelMatrix * vec4(0.0, 0.0, 1.0, 0.0)).xyz);
          // Dot with camera's view direction (+Z world = toward camera)
          vFacing = dot(wn, vec3(0.0, 0.0, 1.0));
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      const FS = /* glsl */`
        uniform sampler2D uTex;
        uniform float     uSpin;
        varying vec2      vUv;
        varying float     vFacing;

        void main() {
          // Fade out back-facing cards
          float opacity = smoothstep(-0.12, 0.40, vFacing);

          // Chromatic aberration scales with spin speed
          float ca = abs(uSpin) * 0.014;
          float r = texture2D(uTex, vec2(vUv.x + ca, vUv.y)).r;
          float g = texture2D(uTex, vUv).g;
          float b = texture2D(uTex, vec2(vUv.x - ca, vUv.y)).b;
          float a = texture2D(uTex, vUv).a;

          // Desaturate side / back cards
          float gray = 0.299*r + 0.587*g + 0.114*b;
          float sat  = smoothstep(0.0, 0.55, vFacing);
          vec3  col  = mix(vec3(gray), vec3(r, g, b), sat);

          gl_FragColor = vec4(col, a * opacity);
        }
      `;

      /* ── Phase 3: Texture generation ──────────── */
      function rrect(ctx, x, y, w, h, rad) {
        ctx.beginPath();
        ctx.moveTo(x + rad, y);
        ctx.lineTo(x + w - rad, y);
        ctx.arcTo(x+w, y,   x+w, y+rad,   rad);
        ctx.lineTo(x + w, y + h - rad);
        ctx.arcTo(x+w, y+h, x+w-rad, y+h, rad);
        ctx.lineTo(x + rad, y + h);
        ctx.arcTo(x, y+h, x, y+h-rad,     rad);
        ctx.lineTo(x, y + rad);
        ctx.arcTo(x, y,   x+rad, y,        rad);
        ctx.closePath();
      }

      function makeTexture(card) {
        const TW = 480, TH = 640;
        const oc = document.createElement('canvas');
        oc.width = TW; oc.height = TH;
        const ctx = oc.getContext('2d');

        // Clip to rounded rect
        rrect(ctx, 0, 0, TW, TH, 24);
        ctx.fillStyle = card.bg;
        ctx.fill();
        ctx.save();
        rrect(ctx, 0, 0, TW, TH, 24);
        ctx.clip();

        // Bottom gradient for text legibility
        const grd = ctx.createLinearGradient(0, TH * 0.45, 0, TH);
        grd.addColorStop(0, 'rgba(0,0,0,0)');
        grd.addColorStop(1, 'rgba(0,0,0,0.78)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, TW, TH);

        // Accent strip
        ctx.fillStyle = card.ac;
        ctx.fillRect(0, 0, TW, 4);

        ctx.restore();

        // Card ID
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.font = '400 14px "IBM Plex Mono", monospace';
        ctx.fillText(card.id, 38, 52);

        // Title
        const tsz = card.title.length > 9 ? 42 : 52;
        ctx.fillStyle = '#f0eeeb';
        ctx.font = `500 ${tsz}px "IBM Plex Mono", monospace`;
        ctx.fillText(card.title, 38, TH - 94);

        // Subtitle
        ctx.fillStyle = card.ac;
        ctx.font = 'italic 18px "IBM Plex Mono", monospace';
        ctx.fillText(card.sub, 38, TH - 62);

        // Tag
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.font = '400 13px "IBM Plex Mono", monospace';
        ctx.fillText(card.tag, 38, TH - 34);

        // Link indicator
        if (card.href) {
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.font = '400 13px "IBM Plex Mono", monospace';
          ctx.textAlign = 'right';
          ctx.fillText('→', TW - 38, TH - 34);
          ctx.textAlign = 'left';
        }

        // Subtle border
        rrect(ctx, 0.5, 0.5, TW - 1, TH - 1, 24);
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth = 1;
        ctx.stroke();

        return new THREE.CanvasTexture(oc);
      }

      /* ── Shared uSpin uniform (all cards reference same object) */
      const spinUniform = { value: 0 };

      /* ── Build sphere (called on init + resize) ─ */
      let meshes = [];

      function buildSphere() {
        meshes.forEach(m => {
          group.remove(m);
          m.geometry.dispose();
          m.material.dispose();
        });
        meshes = [];

        C = cfg();
        cam.fov = C.fov;
        cam.aspect = innerWidth / innerHeight;
        cam.position.z = C.z;
        cam.updateProjectionMatrix();
        R.setSize(innerWidth, innerHeight);

        const positions = fibSphere(N, C.r);
        const rng = makeRng(42); // deterministic seed

        CARDS.forEach((card, i) => {
          const geo = new THREE.PlaneGeometry(C.cw, C.ch, 1, 1);
          const mat = new THREE.ShaderMaterial({
            vertexShader:   VS,
            fragmentShader: FS,
            uniforms: {
              uTex:  { value: makeTexture(card) },
              uSpin: spinUniform,               // shared reference
            },
            transparent: true,
            depthWrite:  false,
            side:        THREE.FrontSide,
          });

          const m = new THREE.Mesh(geo, mat);
          m.position.copy(positions[i]);
          m.lookAt(new THREE.Vector3(0, 0, 0)); // face outward from sphere center

          // Seeded random tilt — organic, non-grid feel
          m.rotateZ((rng() - 0.5) * 0.22);
          m.rotateY((rng() - 0.5) * 0.14);

          m.scale.setScalar(0.8);
          group.add(m);
          meshes.push(m);
        });
      }

      buildSphere();

      /* ═══════════════════════════════════════════════
         PHASE 2: Rotation state + snap
      ═══════════════════════════════════════════════ */
      let velX = 0, velY = 0;
      let rotX = 0, rotY = 0;
      let snapping = false;
      let snapIdx  = -1;

      const tmpV  = new THREE.Vector3();
      const CAM_DIR = new THREE.Vector3(0, 0, 1); // toward camera

      /* ── Render loop ──────────────────────────── */
      function tick() {
        requestAnimationFrame(tick);

        // Inertia decay
        velX *= 0.92;
        velY *= 0.92;

        const spin = Math.sqrt(velX * velX + velY * velY);

        // Snap trigger: when spin nearly settles
        if (spin < 0.0022 && spin > 0.0001 && !snapping) {
          let maxDot = -Infinity;
          meshes.forEach((m, i) => {
            m.getWorldPosition(tmpV);
            const d = tmpV.normalize().dot(CAM_DIR);
            if (d > maxDot) { maxDot = d; snapIdx = i; }
          });
          snapping = true;
        }

        // Snap spring: gently pull front card toward center
        if (snapping && snapIdx >= 0) {
          meshes[snapIdx].getWorldPosition(tmpV);
          velY -= (tmpV.x / C.r) * 0.032; // bring X error → 0
          velX += (tmpV.y / C.r) * 0.032; // bring Y error → 0
          if (spin < 0.00008) snapping = false;
        }

        rotX += velX;
        rotY += velY;
        group.rotation.x = rotX;
        group.rotation.y = rotY;

        // Motion blur (Phase 3)
        spinUniform.value = spin;
        canvas.style.filter = spin > 0.006
          ? `blur(${Math.min(spin * 55, 7).toFixed(1)}px)`
          : '';

        // Per-card: scale by facing, track active
        let frontIdx = 0, maxDot = -Infinity;
        meshes.forEach((m, i) => {
          m.getWorldPosition(tmpV);
          const dot = tmpV.normalize().dot(CAM_DIR);

          // Scale: active card larger, back cards smaller
          const tScale = 0.52 + Math.max(0, dot) * 0.66;
          m.scale.setScalar(m.scale.x + (tScale - m.scale.x) * 0.09);

          // Render back-to-front for correct alpha blending
          m.renderOrder = Math.round((dot + 1) * 50);

          if (dot > maxDot) { maxDot = dot; frontIdx = i; }
        });

        setActive(frontIdx);
        R.render(scene, cam);
      }
      tick();

      /* ═══════════════════════════════════════════════
         PHASE 2: All input handlers
         Convention:
           velY += dx → drag right = sphere turns right (natural globe feel)
           velX += dy → drag down  = sphere tilts down
      ═══════════════════════════════════════════════ */
      const INPUT_K = 0.013;

      function onDragStart() { snapping = false; fadeHint(); }

      /* Touch */
      let tx = null, ty = null;
      window.addEventListener('touchstart', e => {
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
        onDragStart();
      }, { passive: true });

      window.addEventListener('touchmove', e => {
        if (tx === null) return;
        velY += (e.touches[0].clientX - tx) * INPUT_K;
        velX += (e.touches[0].clientY - ty) * INPUT_K;
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchend', () => { tx = ty = null; }, { passive: true });

      /* Wheel */
      window.addEventListener('wheel', e => {
        e.preventDefault();
        velY += e.deltaX * 0.004;
        velY += e.deltaY * 0.004;
        onDragStart();
      }, { passive: false });

      /* Mouse drag */
      let mx = null, my = null;
      window.addEventListener('mousedown', e => {
        mx = e.clientX; my = e.clientY;
        onDragStart();
      });
      window.addEventListener('mousemove', e => {
        if (mx === null) return;
        velY += (e.clientX - mx) * INPUT_K;
        velX += (e.clientY - my) * INPUT_K;
        mx = e.clientX; my = e.clientY;
      });
      window.addEventListener('mouseup', () => { mx = my = null; });

      /* Keyboard */
      window.addEventListener('keydown', e => {
        const k = 0.08;
        if (e.key === 'ArrowRight') { velY -= k; onDragStart(); }
        if (e.key === 'ArrowLeft')  { velY += k; onDragStart(); }
        if (e.key === 'ArrowDown')  { velX += k; onDragStart(); }
        if (e.key === 'ArrowUp')    { velX -= k; onDragStart(); }
      });

      /* Click active card → navigate */
      canvas.addEventListener('click', () => {
        if (Math.sqrt(velX*velX + velY*velY) > 0.007) return;
        const card = CARDS[activeIdx];
        if (card.href) location.href = card.href;
      });

      /* Resize */
      window.addEventListener('resize', () => { buildSphere(); });
    }

  })();
  </script>
</body>
</html>
