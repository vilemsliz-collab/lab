<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sphere Carousel — Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #F3F4F9;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Back link ── */
    .back {
      position: fixed;
      top: 24px; left: 28px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #aaa; text-decoration: none;
      z-index: 100;
      transition: color 0.2s;
    }
    .back:hover { color: #222; }

    /* ── Dev toggle button ── */
    #dev-toggle {
      position: fixed;
      bottom: 80px; right: 16px;
      min-width: 56px; height: 36px;
      padding: 0 12px;
      background: #0a0a0c;
      border: 1px solid #2a2a30;
      border-radius: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      color: #888;
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      touch-action: auto;
    }
    #dev-toggle:hover { color: #c8ff00; border-color: #c8ff00; }
    .dev-open #dev-toggle { color: #c8ff00; border-color: #c8ff00; }
    @media (max-width: 767px) {
      #dev-toggle {
        min-width: 96px; height: 108px;
        font-size: 13px; letter-spacing: 0.14em;
        border-radius: 28px;
        bottom: 88px;
      }
    }

    /* ── Stage: CSS 3D perspective container ── */
    #stage {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* perspective set dynamically from CFG */
      perspective-origin: 50% 50%;
      overflow: hidden;
      transition: right 0.28s ease;
    }
    .dev-open #stage { right: 260px; }

    /* ── Cards ── */
    .card {
      position: absolute;
      width: min(92vw, 364px);
      aspect-ratio: 364 / 555;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 22px;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card.is-active { cursor: default; }

    .card-id {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }
    .card-spacer { flex: 1; }
    .card-title {
      font-family: 'Roboto Flex', sans-serif;
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 300;
      font-variation-settings: 'wdth' 151;
      color: #f0eeeb;
      line-height: 1.1;
      margin-bottom: 5px;
    }
    .card-sub {
      font-family: 'Roboto Flex', sans-serif;
      font-size: 13px;
      font-weight: 300;
      font-variation-settings: 'wdth' 151;
      margin-bottom: 5px;
    }
    .card-tag {
      font-family: 'Roboto Flex', sans-serif;
      font-size: 11px;
      font-variation-settings: 'wdth' 151;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.08em;
    }
    .card-arrow {
      position: absolute;
      bottom: 22px; right: 22px;
      font-size: 15px;
      color: rgba(255,255,255,0.22);
    }

    /* ── Info label ── */
    .info {
      position: fixed;
      bottom: 80px; left: 28px;
      z-index: 50;
      pointer-events: none;
    }
    .info-title  { font-size: 13px; font-weight: 500; color: #222; margin-bottom: 3px; }
    .info-counter { font-size: 11px; color: #aaa; letter-spacing: 0.08em; }

    /* ── Scrubber ── */
    #scrubber {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 65px;
      z-index: 40;
      background: #F3F4F9;
      cursor: grab;
      touch-action: none;
      border-top: 1px solid #e2e3ea;
      transition: right 0.28s ease;
    }
    .dev-open #scrubber { right: 260px; }
    #scrubber:active { cursor: grabbing; }
    #scrubber canvas { display: block; }

    /* ── Dev Panel ── */
    #dev-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 260px;
      background: rgba(10,10,12,0.93);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
      touch-action: auto;
      user-select: text;
      -webkit-user-select: text;
      overflow: hidden;
    }
    .dev-open #dev-panel { transform: translateX(0); }

    #dev-panel-inner {
      flex: 1;
      overflow-y: auto;
      padding: 56px 16px 16px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .dev-section {
      margin-bottom: 20px;
    }
    .dev-section-title {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid #1e1e22;
    }

    .dev-row {
      display: grid;
      grid-template-columns: 72px 1fr 44px;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .dev-label {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dev-row input[type="range"] {
      width: 100%;
      height: 3px;
      accent-color: #c8ff00;
      cursor: pointer;
    }
    .dev-row input[type="number"] {
      width: 100%;
      background: #111115;
      border: 1px solid #2a2a30;
      border-radius: 3px;
      color: #c8ff00;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 3px 4px;
      text-align: right;
      -moz-appearance: textfield;
    }
    .dev-row input[type="number"]::-webkit-inner-spin-button,
    .dev-row input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .dev-row input[type="number"]:focus {
      outline: none;
      border-color: #c8ff00;
    }

    #dev-copy {
      margin: 12px 16px 16px;
      padding: 9px;
      background: #c8ff00;
      border: none;
      border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0a0a0c;
      cursor: pointer;
      transition: background 0.15s;
      touch-action: auto;
    }
    #dev-copy:hover { background: #d4ff33; }
    #dev-copy.copied { background: #444; color: #c8ff00; }
  </style>
</head>
<body>

  <a class="back" href="./index.html">← lab</a>
  <button id="dev-toggle" title="Toggle dev tools (D)">DEV</button>

  <div id="stage"></div>

  <div class="info">
    <div class="info-title"   id="info-title"></div>
    <div class="info-counter" id="info-counter"></div>
  </div>

  <div id="scrubber"></div>

  <!-- Dev Panel -->
  <div id="dev-panel">
    <div id="dev-panel-inner"></div>
    <button id="dev-copy">Copy config</button>
  </div>

  <script>
  (() => {
    'use strict';

    /* ══════════════════════════════════════════════════════════
       CFG — single source of truth for all tweak-able values
    ══════════════════════════════════════════════════════════ */
    const PRESETS = {
      mobile: {
        R_MULT: 1.5, R_MAX: 1010, PERSPECTIVE: 200,
        LAT: [-62, 66, -19, 42, -31], LON_SPREAD: 0.88,
        ROT_MULT: 0, ROLL_MAX: 0,
        SCALE_ACTIVE: 0.79, SCALE_SPHERE: 0.83,
        OPACITY_MULT: 0.46, OPACITY_BASE: 1, BLUR_MAX: 0,
        FRICTION: 0.7, SPRING: 0.23, DRAG_SENS: 1.3,
      },
      desktop: {
        R_MULT: 1.5, R_MAX: 1010, PERSPECTIVE: 590,
        LAT: [-8, 32, -29, 42, 24], LON_SPREAD: 0.56,
        ROT_MULT: 0, ROLL_MAX: 0,
        SCALE_ACTIVE: 1.29, SCALE_SPHERE: 0.83,
        OPACITY_MULT: 0.46, OPACITY_BASE: 1, BLUR_MAX: 0,
        FRICTION: 0.90, SPRING: 0.10, DRAG_SENS: 0.60,
      },
    };

    // CFG is the live object — always mutate this, never the presets
    const CFG = Object.assign({}, PRESETS.mobile);

    function loadPreset(name) {
      const p = PRESETS[name];
      Object.keys(p).forEach(k => {
        CFG[k] = Array.isArray(p[k]) ? [...p[k]] : p[k];
      });
      syncPerspective();
      syncDevPanel();
    }

    function checkBreakpoint() {
      loadPreset(innerWidth >= 768 ? 'desktop' : 'mobile');
    }

    /* ── Card data ── */
    const CARDS = [
      { id:'001', title:'Ink Text',  sub:'typographic', tag:'2025-03', href:'./ink-text/',    bg:'#12131a', ac:'#c8ff00' },
      { id:'002', title:'Orbs v5',   sub:'generative',  tag:'2025-03', href:'./orbs-v5.html', bg:'#080e1c', ac:'#4dd0e1' },
      { id:'003', title:'Signal',    sub:'audio viz',   tag:'wip',     href:null,             bg:'#1e0a0a', ac:'#ff5252' },
      { id:'004', title:'Terrain',   sub:'procedural',  tag:'wip',     href:null,             bg:'#071207', ac:'#66ff99' },
      { id:'005', title:'Fluid',     sub:'simulation',  tag:'planned', href:null,             bg:'#141414', ac:'#e0e0e0' },
    ];
    const N = CARDS.length;

    /* ── Build card elements ── */
    const stage     = document.getElementById('stage');
    const titleEl   = document.getElementById('info-title');
    const counterEl = document.getElementById('info-counter');

    const cardEls = CARDS.map((card) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.style.background = card.bg;
      el.style.borderTop  = `3px solid ${card.ac}`;
      el.innerHTML = `
        <div class="card-id">${card.id}</div>
        <div class="card-spacer"></div>
        <div class="card-title">${card.title}</div>
        <div class="card-sub" style="color:${card.ac}">${card.sub}</div>
        <div class="card-tag">${card.tag}</div>
      `;
      stage.appendChild(el);
      return el;
    });

    /* ── Per-card seeded roll ── */
    function seededRng(seed) {
      let s = seed | 0;
      return () => { s = (Math.imul(s, 1664525) + 1013904223) | 0; return (s >>> 0) / 0xFFFFFFFF; };
    }
    // Pre-compute base random per card (0..1); scale by CFG.ROLL_MAX at render time
    const ROLL_BASE = CARDS.map((_, i) => {
      const r = seededRng(i * 6271 + 3491);
      return (r() - 0.5) * 2; // −1..1
    });

    /* ── Continuous position state ── */
    let posY  = 0;
    let velY  = 0;
    let rafId = null;

    function lerp(a, b, t)  { return a + (b - a) * t; }
    function smoothstep(t)  { return t * t * (3 - 2 * t); }

    /* ── Apply CSS perspective from CFG ── */
    function syncPerspective() {
      stage.style.perspective = CFG.PERSPECTIVE + 'px';
    }
    syncPerspective();

    /* ── Transform function ── */
    function applyTransforms(pos) {
      const vw  = innerWidth;
      const R   = Math.min(vw * CFG.R_MULT, CFG.R_MAX);
      const LAT = CFG.LAT.map(d => d * Math.PI / 180);

      CARDS.forEach((_, i) => {
        let off = i - pos;
        while (off >  N / 2) off -= N;
        while (off < -N / 2) off += N;

        const el    = cardEls[i];
        const phi   = LAT[i % LAT.length];
        const theta = off * (2 * Math.PI / N) * CFG.LON_SPREAD;
        const abs   = Math.abs(off);
        const st    = smoothstep(Math.min(1, abs));

        const cosPhi = Math.cos(phi);
        const sinPhi = Math.sin(phi);

        const tx = cosPhi * Math.sin(theta) * R * st;
        const ty = sinPhi  * R * st;
        const tz = (cosPhi * Math.cos(theta) - 1) * R * st;

        const facing  = cosPhi * Math.cos(theta);
        const ry      = -(theta * 180 / Math.PI) * CFG.ROT_MULT * st;
        const rx      = -(phi   * 180 / Math.PI) * CFG.ROT_MULT * st;
        const rollDeg = ROLL_BASE[i] * CFG.ROLL_MAX;

        const scale   = lerp(CFG.SCALE_ACTIVE, CFG.SCALE_SPHERE, st);
        const opacity = Math.max(0, Math.min(1, facing * CFG.OPACITY_MULT + CFG.OPACITY_BASE));
        const blur    = Math.max(0, (1 - facing) * CFG.BLUR_MAX);

        el.style.transform = [
          `translateX(${tx.toFixed(1)}px)`,
          `translateY(${ty.toFixed(1)}px)`,
          `translateZ(${tz.toFixed(1)}px)`,
          `rotateX(${rx.toFixed(1)}deg)`,
          `rotateY(${ry.toFixed(1)}deg)`,
          `rotateZ(${rollDeg.toFixed(1)}deg)`,
          `scale(${scale.toFixed(3)})`,
        ].join(' ');
        el.style.opacity = opacity.toFixed(3);
        el.style.filter  = blur < 0.1 ? 'none' : `blur(${blur.toFixed(1)}px)`;
        el.style.zIndex  = abs < 0.5 ? '20' : String(Math.max(1, Math.round(facing * 10 + 5)));
        el.classList.toggle('is-active', abs < 0.5);
      });

      const idx = (((Math.round(pos) % N) + N) % N);
      titleEl.textContent   = CARDS[idx].title;
      counterEl.textContent = `${String(idx + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
      drawScrubber(pos);
    }

    /* ── Animation loop with inertia + snap ── */
    function loop() {
      velY *= CFG.FRICTION;
      posY += velY;

      const target = Math.round(posY);
      if (Math.abs(velY) < 0.02) {
        const spring = (target - posY) * CFG.SPRING;
        posY += spring;
        if (Math.abs(velY) < 0.0003 && Math.abs(posY - target) < 0.001) {
          posY  = ((target % N) + N) % N;
          velY  = 0;
          applyTransforms(posY);
          rafId = null;
          return;
        }
      }

      applyTransforms(posY);
      rafId = requestAnimationFrame(loop);
    }

    function kick() {
      if (!rafId) rafId = requestAnimationFrame(loop);
    }

    /* ── Scrubber canvas ── */
    const scrubEl = document.getElementById('scrubber');
    const sc      = document.createElement('canvas');
    scrubEl.appendChild(sc);
    const DPR = Math.min(devicePixelRatio, 2);

    function resizeScrubber() {
      sc.width  = innerWidth * DPR;
      sc.height = 65 * DPR;
      sc.style.width  = innerWidth + 'px';
      sc.style.height = '65px';
    }
    resizeScrubber();
    const sctx = sc.getContext('2d');

    function drawScrubber(pos) {
      const w = sc.width, h = sc.height;
      sctx.clearRect(0, 0, w, h);
      const SPACING = 7  * DPR;
      const LINE_H  = 26 * DPR;
      const LINE_W  = 1  * DPR;
      const cy      = h / 2;
      const total   = Math.ceil(w / SPACING) + 2;
      const rawShift = -(pos / N) * w;
      const shift    = ((rawShift % SPACING) + SPACING) % SPACING;
      const activeX  = w / 2;
      for (let i = -1; i < total; i++) {
        const x = i * SPACING + shift;
        const lineCardPos = ((i * SPACING + shift - activeX) / w) * N + pos;
        const nearest     = Math.round(lineCardPos);
        const distToCard  = Math.abs(lineCardPos - nearest);
        const hl          = Math.max(0, 1 - distToCard * N * 0.9);
        const dark = 200, bright = 100;
        const col  = Math.round(dark - (dark - bright) * hl);
        sctx.fillStyle = `rgb(${col},${col},${col})`;
        sctx.fillRect(x - LINE_W / 2, cy - LINE_H / 2, LINE_W, LINE_H);
      }
    }

    /* ── Input: stage drag ── */
    const dragK = () => 1 / (innerWidth * CFG.DRAG_SENS);

    let stageTouch = null;
    stage.addEventListener('touchstart', e => {
      stageTouch = e.touches[0].clientX; velY = 0;
    }, { passive: true });
    stage.addEventListener('touchmove', e => {
      if (stageTouch === null) return;
      const dx   = e.touches[0].clientX - stageTouch;
      const dPos = -dx * dragK();
      velY  = velY * 0.5 + dPos * 0.5;
      posY += dPos;
      stageTouch = e.touches[0].clientX;
      applyTransforms(posY);
    }, { passive: true });
    stage.addEventListener('touchend', () => { stageTouch = null; kick(); }, { passive: true });

    let stageMouse = null;
    stage.addEventListener('mousedown', e => { stageMouse = e.clientX; velY = 0; });

    /* ── Input: scrubber drag ── */
    const scrubK = () => 1 / (innerWidth * 0.45);

    let scrubTouch = null;
    scrubEl.addEventListener('touchstart', e => {
      e.stopPropagation();
      scrubTouch = e.touches[0].clientX; velY = 0;
    }, { passive: true });
    scrubEl.addEventListener('touchmove', e => {
      if (scrubTouch === null) return;
      const dx   = e.touches[0].clientX - scrubTouch;
      const dPos = -dx * scrubK();
      velY  = velY * 0.5 + dPos * 0.5;
      posY += dPos;
      scrubTouch = e.touches[0].clientX;
      applyTransforms(posY);
    }, { passive: true });
    scrubEl.addEventListener('touchend', () => { scrubTouch = null; kick(); }, { passive: true });

    let scrubMouse = null;
    scrubEl.addEventListener('mousedown', e => { scrubMouse = e.clientX; velY = 0; });

    /* ── Consolidated window mouse handlers ── */
    window.addEventListener('mousemove', e => {
      if (stageMouse !== null) {
        const dx   = e.clientX - stageMouse;
        const dPos = -dx * dragK();
        velY  = velY * 0.5 + dPos * 0.5;
        posY += dPos;
        stageMouse = e.clientX;
        applyTransforms(posY);
      } else if (scrubMouse !== null) {
        const dx   = e.clientX - scrubMouse;
        const dPos = -dx * scrubK();
        velY  = velY * 0.5 + dPos * 0.5;
        posY += dPos;
        scrubMouse = e.clientX;
        applyTransforms(posY);
      }
    });
    window.addEventListener('mouseup', () => {
      if (stageMouse !== null || scrubMouse !== null) kick();
      stageMouse = null;
      scrubMouse = null;
    });

    /* ── Wheel ── */
    window.addEventListener('wheel', e => {
      e.preventDefault();
      velY += (e.deltaX + e.deltaY) * 0.004;
      kick();
    }, { passive: false });

    /* ── Keyboard ── */
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { velY += 0.12; kick(); }
      if (e.key === 'ArrowLeft')  { velY -= 0.12; kick(); }
      if (e.key === 'd' || e.key === 'D') toggleDev();
    });


    /* ── Resize ── */
    window.addEventListener('resize', () => {
      checkBreakpoint();
      resizeScrubber();
      applyTransforms(posY);
    });

    /* ══════════════════════════════════════════════════════════
       DEV PANEL
    ══════════════════════════════════════════════════════════ */

    const devPanel   = document.getElementById('dev-panel');
    const devInner   = document.getElementById('dev-panel-inner');
    const devToggle  = document.getElementById('dev-toggle');
    const devCopy    = document.getElementById('dev-copy');
    const devBpLabel = document.createElement('div');
    devBpLabel.style.cssText = 'font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#555;padding:14px 16px 0;';
    devPanel.insertBefore(devBpLabel, devInner);

    // rowMap: key → { range, num } — populated after panel is built
    const rowMap = {};

    function syncDevPanel() {
      devBpLabel.textContent = innerWidth >= 768 ? 'breakpoint: desktop' : 'breakpoint: mobile';
      Object.entries(rowMap).forEach(([key, { range, num }]) => {
        const v = cfgGet(key);
        range.value = v;
        num.value   = v;
      });
    }

    function toggleDev() {
      document.body.classList.toggle('dev-open');
      // resize scrubber after transition so it fills correct width
      setTimeout(() => { resizeScrubber(); applyTransforms(posY); }, 300);
    }
    let devTouchFired = false;
    devToggle.addEventListener('touchend', e => {
      e.stopPropagation();
      devTouchFired = true;
      toggleDev();
    }, { passive: true });
    devToggle.addEventListener('click', () => {
      if (devTouchFired) { devTouchFired = false; return; }
      toggleDev();
    });

    /* ── Build controls ── */
    const SECTIONS = [
      {
        title: 'Sphere',
        rows: [
          { label: 'R mult',      key: 'R_MULT',      min: 0.3,  max: 1.5,  step: 0.01 },
          { label: 'R max',       key: 'R_MAX',        min: 200,  max: 1200, step: 10   },
          { label: 'Perspective', key: 'PERSPECTIVE',  min: 200,  max: 2000, step: 10   },
        ],
      },
      {
        title: 'Placement',
        rows: [
          { label: 'Lat 0',       key: 'LAT.0',        min: -90,  max: 90,   step: 1    },
          { label: 'Lat 1',       key: 'LAT.1',        min: -90,  max: 90,   step: 1    },
          { label: 'Lat 2',       key: 'LAT.2',        min: -90,  max: 90,   step: 1    },
          { label: 'Lat 3',       key: 'LAT.3',        min: -90,  max: 90,   step: 1    },
          { label: 'Lat 4',       key: 'LAT.4',        min: -90,  max: 90,   step: 1    },
          { label: 'Lon spread',  key: 'LON_SPREAD',   min: 0.2,  max: 1.0,  step: 0.01 },
        ],
      },
      {
        title: 'Rotation',
        rows: [
          { label: 'Rot mult',    key: 'ROT_MULT',     min: 0,    max: 1.5,  step: 0.01 },
          { label: 'Roll max',    key: 'ROLL_MAX',      min: 0,    max: 45,   step: 1    },
        ],
      },
      {
        title: 'Appearance',
        rows: [
          { label: 'Scale act',   key: 'SCALE_ACTIVE', min: 0.5,  max: 1.5,  step: 0.01 },
          { label: 'Scale sph',   key: 'SCALE_SPHERE', min: 0.3,  max: 1.2,  step: 0.01 },
          { label: 'Opacity ×',   key: 'OPACITY_MULT', min: 0,    max: 2.0,  step: 0.01 },
          { label: 'Opacity base',key: 'OPACITY_BASE', min: 0,    max: 1.0,  step: 0.01 },
          { label: 'Blur max',    key: 'BLUR_MAX',      min: 0,    max: 20,   step: 0.5  },
        ],
      },
      {
        title: 'Physics',
        rows: [
          { label: 'Friction',    key: 'FRICTION',     min: 0.70, max: 0.99, step: 0.01 },
          { label: 'Spring',      key: 'SPRING',        min: 0.01, max: 0.40, step: 0.01 },
          { label: 'Drag sens',   key: 'DRAG_SENS',    min: 0.1,  max: 2.0,  step: 0.05 },
        ],
      },
    ];

    // Helpers to get/set nested CFG values (e.g. 'LAT.2')
    function cfgGet(key) {
      const [k, idx] = key.split('.');
      return idx !== undefined ? CFG[k][+idx] : CFG[k];
    }
    function cfgSet(key, val) {
      const [k, idx] = key.split('.');
      if (idx !== undefined) CFG[k][+idx] = val;
      else CFG[k] = val;
      if (k === 'PERSPECTIVE') syncPerspective();
    }

    // Build panel DOM
    SECTIONS.forEach(section => {
      const secEl = document.createElement('div');
      secEl.className = 'dev-section';
      secEl.innerHTML = `<div class="dev-section-title">${section.title}</div>`;

      section.rows.forEach(row => {
        const rowEl   = document.createElement('div');
        rowEl.className = 'dev-row';

        const label   = document.createElement('span');
        label.className = 'dev-label';
        label.textContent = row.label;

        const range   = document.createElement('input');
        range.type    = 'range';
        range.min     = row.min;
        range.max     = row.max;
        range.step    = row.step;
        range.value   = cfgGet(row.key);

        const num     = document.createElement('input');
        num.type      = 'number';
        num.min       = row.min;
        num.max       = row.max;
        num.step      = row.step;
        num.value     = cfgGet(row.key);

        function update(val) {
          const v = parseFloat(val);
          if (isNaN(v)) return;
          const clamped = Math.min(row.max, Math.max(row.min, v));
          cfgSet(row.key, clamped);
          range.value = clamped;
          num.value   = clamped;
          applyTransforms(posY);
        }

        range.addEventListener('input',  () => update(range.value));
        num.addEventListener('change',   () => update(num.value));
        num.addEventListener('keydown',  e => { if (e.key === 'Enter') update(num.value); });
        // Prevent panel number inputs from triggering carousel keyboard shortcuts
        num.addEventListener('keydown', e => e.stopPropagation());

        // Prevent range drag from accidentally moving carousel
        range.addEventListener('mousedown',  e => e.stopPropagation());
        range.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });

        rowMap[row.key] = { range, num };
        rowEl.appendChild(label);
        rowEl.appendChild(range);
        rowEl.appendChild(num);
        secEl.appendChild(rowEl);
      });

      devInner.appendChild(secEl);
    });

    // Sync sliders to initial breakpoint (panel built, CFG already set by checkBreakpoint in init)
    syncDevPanel();

    /* ── Copy config ── */
    devCopy.addEventListener('click', () => {
      const out = {
        R_MULT:       CFG.R_MULT,
        R_MAX:        CFG.R_MAX,
        PERSPECTIVE:  CFG.PERSPECTIVE,
        LAT:          [...CFG.LAT],
        LON_SPREAD:   CFG.LON_SPREAD,
        ROT_MULT:     CFG.ROT_MULT,
        ROLL_MAX:     CFG.ROLL_MAX,
        SCALE_ACTIVE: CFG.SCALE_ACTIVE,
        SCALE_SPHERE: CFG.SCALE_SPHERE,
        OPACITY_MULT: CFG.OPACITY_MULT,
        OPACITY_BASE: CFG.OPACITY_BASE,
        BLUR_MAX:     CFG.BLUR_MAX,
        FRICTION:     CFG.FRICTION,
        SPRING:       CFG.SPRING,
        DRAG_SENS:    CFG.DRAG_SENS,
      };
      navigator.clipboard.writeText(JSON.stringify(out, null, 2)).then(() => {
        devCopy.textContent = 'Copied!';
        devCopy.classList.add('copied');
        setTimeout(() => {
          devCopy.textContent = 'Copy config';
          devCopy.classList.remove('copied');
        }, 1500);
      });
    });

    /* ── Init ── */
    checkBreakpoint();
    applyTransforms(0);

  })();
  </script>
</body>
</html>
