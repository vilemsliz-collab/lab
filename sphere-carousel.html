<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sphere Carousel — Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Back link ── */
    .back {
      position: fixed;
      top: 24px; left: 28px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #555; text-decoration: none;
      z-index: 100;
      transition: color 0.2s;
    }
    .back:hover { color: #e8e8e0; }

    /* ── Stage: CSS 3D perspective container ── */
    #stage {
      position: fixed;
      /* leave 65px at bottom for scrubber */
      top: 0; left: 0; right: 0; bottom: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1100px;
      perspective-origin: 50% 50%;
      overflow: hidden;
    }

    /* ── Cards ── */
    .card {
      position: absolute;
      /* 364:555 ratio from Figma; width fills ~92 vw on iPhone */
      width: min(92vw, 364px);
      aspect-ratio: 364 / 555;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 22px;
      /* transition applied to transform, opacity, filter */
      transition:
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        opacity   0.45s ease,
        filter    0.45s ease;
      will-change: transform, opacity, filter;
    }
    .card.is-active { cursor: pointer; }

    /* Card inner content */
    .card-id {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }
    .card-spacer { flex: 1; }
    .card-title {
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 500;
      color: #f0eeeb;
      line-height: 1.1;
      margin-bottom: 5px;
    }
    .card-sub {
      font-size: 13px;
      font-style: italic;
      margin-bottom: 5px;
    }
    .card-tag {
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.08em;
    }
    .card-arrow {
      position: absolute;
      bottom: 22px; right: 22px;
      font-size: 15px;
      color: rgba(255,255,255,0.22);
    }

    /* ── Info label above scrubber ── */
    .info {
      position: fixed;
      bottom: 80px; left: 28px;
      z-index: 50;
      pointer-events: none;
    }
    .info-title {
      font-size: 13px; font-weight: 500;
      color: #e8e8e0;
      margin-bottom: 3px;
    }
    .info-counter { font-size: 11px; color: #555; letter-spacing: 0.08em; }

    /* ── Scrubber ── */
    #scrubber {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 65px;
      z-index: 40;
      background: #0d0d0d;
      cursor: grab;
      touch-action: none;
      border-top: 1px solid #1a1a1a;
    }
    #scrubber:active { cursor: grabbing; }
    #scrubber canvas { display: block; }
  </style>
</head>
<body>

  <a class="back" href="./index.html">← lab</a>

  <div id="stage"></div>

  <div class="info">
    <div class="info-title"  id="info-title"></div>
    <div class="info-counter" id="info-counter"></div>
  </div>

  <div id="scrubber"></div>

  <script>
  (() => {
    'use strict';

    /* ── Card data ── */
    const CARDS = [
      { id:'001', title:'Ink Text',  sub:'typographic', tag:'2025-03', href:'./ink-text/',    bg:'#12131a', ac:'#c8ff00' },
      { id:'002', title:'Orbs v5',   sub:'generative',  tag:'2025-03', href:'./orbs-v5.html', bg:'#080e1c', ac:'#4dd0e1' },
      { id:'003', title:'Signal',    sub:'audio viz',   tag:'wip',     href:null,             bg:'#1e0a0a', ac:'#ff5252' },
      { id:'004', title:'Terrain',   sub:'procedural',  tag:'wip',     href:null,             bg:'#071207', ac:'#66ff99' },
      { id:'005', title:'Fluid',     sub:'simulation',  tag:'planned', href:null,             bg:'#141414', ac:'#e0e0e0' },
    ];
    const N = CARDS.length;

    /* ── Build card elements ── */
    const stage    = document.getElementById('stage');
    const titleEl  = document.getElementById('info-title');
    const counterEl = document.getElementById('info-counter');

    const cardEls = CARDS.map((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.style.background = card.bg;
      el.style.borderTop  = `3px solid ${card.ac}`;
      el.innerHTML = `
        <div class="card-id">${card.id}</div>
        <div class="card-spacer"></div>
        <div class="card-title">${card.title}</div>
        <div class="card-sub" style="color:${card.ac}">${card.sub}</div>
        <div class="card-tag">${card.tag}</div>
        ${card.href ? '<div class="card-arrow">→</div>' : ''}
      `;
      stage.appendChild(el);
      return el;
    });

    /* ── Continuous position state ──
       posY is a float; integer posY = card at that index is centered.
       Dragging changes posY continuously; inertia + spring snaps to integer. */
    let posY = 0;   // position (fractional card index)
    let velY = 0;   // velocity
    let rafId = null;

    /* ── Transform function ──
       offset = fractional distance from center (0 = active card).
       Matches reference: center card face-on, side cards offset + rotateY + blur. */
    function applyTransforms(pos) {
      const vw = innerWidth;

      CARDS.forEach((_, i) => {
        // Shortest-path offset in circular carousel
        let off = i - pos;
        while (off >  N / 2) off -= N;
        while (off < -N / 2) off += N;

        const abs  = Math.abs(off);
        const sign = off < 0 ? -1 : off > 0 ? 1 : 0;
        const el   = cardEls[i];

        if (abs > 2.6) {
          // Far cards: hide completely
          el.style.opacity   = '0';
          el.style.transform = `translateX(${sign * vw * 1.2}px) scale(0.1)`;
          el.style.filter    = 'blur(8px)';
          el.style.zIndex    = '0';
          el.classList.remove('is-active');
          return;
        }

        /* Reference formula adapted for mobile:
           - translateX: ±(vw * 0.48) per step  → side card peeks from behind center card
           - scale: 1 → 0.42 at ±1 → 0.18 at ±2 (matches ref scale(0.4/index))
           - rotateY: 0 → ±28deg at ±1 → ±38deg at ±2
           - opacity: 1 → 0.65 → 0.30
           - blur: 0 → 2px → 5px                                          */
        const tx      = sign * Math.min(abs, 2.5) * vw * 0.50;
        const scale   = Math.max(0.05, 0.9 - abs * 0.48);
        const tz      = -abs * 80;                 // subtle Z recession
        const ry      = -sign * Math.min(abs, 1.2) * 28;
        const opacity = Math.max(0, 1 - abs * 0.55);
        const blur    = Math.min(abs * 2.5, 8);

        el.style.transform = `translateX(${tx.toFixed(1)}px) translateZ(${tz.toFixed(1)}px) rotateY(${ry.toFixed(1)}deg) scale(${scale.toFixed(3)})`;
        el.style.opacity   = opacity.toFixed(3);
        el.style.filter    = blur < 0.1 ? 'blur(0px)' : `blur(${blur.toFixed(1)}px)`;
        el.style.zIndex    = String(Math.round(20 - abs * 6));
        el.classList.toggle('is-active', abs < 0.5);
      });

      // Update info labels
      const idx = (((Math.round(pos) % N) + N) % N);
      titleEl.textContent  = CARDS[idx].title;
      counterEl.textContent = `${String(idx + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;

      drawScrubber(pos);
    }

    /* ── Animation loop with inertia + snap ── */
    function loop() {
      velY *= 0.90;
      posY += velY;

      // Spring snap toward nearest integer when velocity is small
      const target = Math.round(posY);
      if (Math.abs(velY) < 0.02) {
        const spring = (target - posY) * 0.10;
        posY += spring;
        if (Math.abs(velY) < 0.0003 && Math.abs(posY - target) < 0.001) {
          posY  = target;
          velY  = 0;
          applyTransforms(posY);
          rafId = null;
          return;
        }
      }

      applyTransforms(posY);
      rafId = requestAnimationFrame(loop);
    }

    function kick() {
      if (!rafId) rafId = requestAnimationFrame(loop);
    }

    /* ── Scrubber canvas ── */
    const scrubEl = document.getElementById('scrubber');
    const sc      = document.createElement('canvas');
    scrubEl.appendChild(sc);
    const DPR = Math.min(devicePixelRatio, 2);

    function resizeScrubber() {
      sc.width  = innerWidth * DPR;
      sc.height = 65 * DPR;
      sc.style.width  = innerWidth + 'px';
      sc.style.height = '65px';
    }
    resizeScrubber();
    const sctx = sc.getContext('2d');

    function drawScrubber(pos) {
      const w = sc.width, h = sc.height;
      sctx.clearRect(0, 0, w, h);

      const SPACING = 7  * DPR;
      const LINE_H  = 26 * DPR;
      const LINE_W  = 1  * DPR;
      const cy      = h / 2;
      const total   = Math.ceil(w / SPACING) + 2;

      // Lines scroll with posY
      const rawShift = -(pos / N) * w;
      const shift    = ((rawShift % SPACING) + SPACING) % SPACING;

      // Active card maps to screen center (w/2)
      const activeX = w / 2;

      for (let i = -1; i < total; i++) {
        const x = i * SPACING + shift;
        // Distance from this line to the "active" center position in card-space
        const lineCardPos = ((i * SPACING + shift - activeX) / w) * N + pos;
        const nearest     = Math.round(lineCardPos);
        const distToCard  = Math.abs(lineCardPos - nearest);
        const hl          = Math.max(0, 1 - distToCard * N * 0.9);

        const dark   = 38;
        const bright = 180;
        const col    = Math.round(dark + (bright - dark) * hl);
        sctx.fillStyle = `rgb(${col},${col},${col})`;
        sctx.fillRect(x - LINE_W / 2, cy - LINE_H / 2, LINE_W, LINE_H);
      }
    }

    /* ── Input: stage drag ── */
    // How many card-widths per pixel of drag
    const dragK = () => 1 / (innerWidth * 0.60);

    let stageTouch = null;
    stage.addEventListener('touchstart', e => {
      stageTouch = e.touches[0].clientX;
      velY = 0;
    }, { passive: true });
    stage.addEventListener('touchmove', e => {
      if (stageTouch === null) return;
      const dx   = e.touches[0].clientX - stageTouch;
      const dPos = -dx * dragK();
      velY  = dPos * 0.6;
      posY += dPos;
      stageTouch = e.touches[0].clientX;
      applyTransforms(posY);
    }, { passive: true });
    stage.addEventListener('touchend', () => { stageTouch = null; kick(); }, { passive: true });

    let stageMouse = null;
    stage.addEventListener('mousedown', e => { stageMouse = e.clientX; velY = 0; });
    window.addEventListener('mousemove', e => {
      if (stageMouse === null) return;
      const dx   = e.clientX - stageMouse;
      const dPos = -dx * dragK();
      velY  = dPos * 0.6;
      posY += dPos;
      stageMouse = e.clientX;
      applyTransforms(posY);
    });
    window.addEventListener('mouseup', () => { stageMouse = null; kick(); });

    /* ── Input: scrubber drag (horizontal only) ── */
    const scrubK = () => 1 / (innerWidth * 0.45);

    let scrubTouch = null;
    scrubEl.addEventListener('touchstart', e => {
      e.stopPropagation();
      scrubTouch = e.touches[0].clientX;
      velY = 0;
    }, { passive: true });
    scrubEl.addEventListener('touchmove', e => {
      if (scrubTouch === null) return;
      const dx   = e.touches[0].clientX - scrubTouch;
      const dPos = -dx * scrubK();
      velY  = dPos * 0.6;
      posY += dPos;
      scrubTouch = e.touches[0].clientX;
      applyTransforms(posY);
    }, { passive: true });
    scrubEl.addEventListener('touchend', () => { scrubTouch = null; kick(); }, { passive: true });

    let scrubMouse = null;
    scrubEl.addEventListener('mousedown', e => { scrubMouse = e.clientX; velY = 0; });
    window.addEventListener('mousemove', e => {
      if (scrubMouse === null) return;
      const dx   = e.clientX - scrubMouse;
      const dPos = -dx * scrubK();
      velY  = dPos * 0.6;
      posY += dPos;
      scrubMouse = e.clientX;
      applyTransforms(posY);
    });
    window.addEventListener('mouseup', () => { scrubMouse = null; });

    /* ── Wheel ── */
    window.addEventListener('wheel', e => {
      e.preventDefault();
      velY += (e.deltaX + e.deltaY) * 0.004;
      kick();
    }, { passive: false });

    /* ── Keyboard ── */
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { velY += 0.12; kick(); }
      if (e.key === 'ArrowLeft')  { velY -= 0.12; kick(); }
    });

    /* ── Click active card → navigate ── */
    stage.addEventListener('click', e => {
      if (Math.abs(velY) > 0.03) return;
      const card = e.target.closest('.card');
      if (!card || !card.classList.contains('is-active')) return;
      const idx = cardEls.indexOf(card);
      if (idx >= 0 && CARDS[idx].href) location.href = CARDS[idx].href;
    });

    /* ── Resize ── */
    window.addEventListener('resize', () => {
      resizeScrubber();
      applyTransforms(posY);
    });

    /* ── Init ── */
    applyTransforms(0);

  })();
  </script>
</body>
</html>
