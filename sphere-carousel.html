<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sphere Carousel — Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #F3F4F9;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Back link ── */
    .back {
      position: fixed;
      top: 24px; left: 28px;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #aaa; text-decoration: none;
      z-index: 100;
      transition: color 0.2s;
    }
    .back:hover { color: #222; }

    /* ── Stage: CSS 3D perspective container ── */
    #stage {
      position: fixed;
      /* leave 65px at bottom for scrubber */
      top: 0; left: 0; right: 0; bottom: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 700px;
      perspective-origin: 50% 50%;
      overflow: hidden;
    }

    /* ── Cards ── */
    .card {
      position: absolute;
      /* 364:555 ratio from Figma; width fills ~92 vw on iPhone */
      width: min(92vw, 364px);
      aspect-ratio: 364 / 555;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 22px;
      /* All animation handled in JS RAF — no CSS transition on transform */
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card.is-active { cursor: pointer; }

    /* Card inner content */
    .card-id {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }
    .card-spacer { flex: 1; }
    .card-title {
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 500;
      color: #f0eeeb;
      line-height: 1.1;
      margin-bottom: 5px;
    }
    .card-sub {
      font-size: 13px;
      font-style: italic;
      margin-bottom: 5px;
    }
    .card-tag {
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.08em;
    }
    .card-arrow {
      position: absolute;
      bottom: 22px; right: 22px;
      font-size: 15px;
      color: rgba(255,255,255,0.22);
    }

    /* ── Info label above scrubber ── */
    .info {
      position: fixed;
      bottom: 80px; left: 28px;
      z-index: 50;
      pointer-events: none;
    }
    .info-title {
      font-size: 13px; font-weight: 500;
      color: #222;
      margin-bottom: 3px;
    }
    .info-counter { font-size: 11px; color: #aaa; letter-spacing: 0.08em; }

    /* ── Scrubber ── */
    #scrubber {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 65px;
      z-index: 40;
      background: #F3F4F9;
      cursor: grab;
      touch-action: none;
      border-top: 1px solid #e2e3ea;
    }
    #scrubber:active { cursor: grabbing; }
    #scrubber canvas { display: block; }
  </style>
</head>
<body>

  <a class="back" href="./index.html">← lab</a>

  <div id="stage"></div>

  <div class="info">
    <div class="info-title"  id="info-title"></div>
    <div class="info-counter" id="info-counter"></div>
  </div>

  <div id="scrubber"></div>

  <script>
  (() => {
    'use strict';

    /* ── Card data ── */
    const CARDS = [
      { id:'001', title:'Ink Text',  sub:'typographic', tag:'2025-03', href:'./ink-text/',    bg:'#12131a', ac:'#c8ff00' },
      { id:'002', title:'Orbs v5',   sub:'generative',  tag:'2025-03', href:'./orbs-v5.html', bg:'#080e1c', ac:'#4dd0e1' },
      { id:'003', title:'Signal',    sub:'audio viz',   tag:'wip',     href:null,             bg:'#1e0a0a', ac:'#ff5252' },
      { id:'004', title:'Terrain',   sub:'procedural',  tag:'wip',     href:null,             bg:'#071207', ac:'#66ff99' },
      { id:'005', title:'Fluid',     sub:'simulation',  tag:'planned', href:null,             bg:'#141414', ac:'#e0e0e0' },
    ];
    const N = CARDS.length;

    /* ── Build card elements ── */
    const stage    = document.getElementById('stage');
    const titleEl  = document.getElementById('info-title');
    const counterEl = document.getElementById('info-counter');

    const cardEls = CARDS.map((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.style.background = card.bg;
      el.style.borderTop  = `3px solid ${card.ac}`;
      el.innerHTML = `
        <div class="card-id">${card.id}</div>
        <div class="card-spacer"></div>
        <div class="card-title">${card.title}</div>
        <div class="card-sub" style="color:${card.ac}">${card.sub}</div>
        <div class="card-tag">${card.tag}</div>
        ${card.href ? '<div class="card-arrow">→</div>' : ''}
      `;
      stage.appendChild(el);
      return el;
    });

    /* ── Per-card fixed latitude + organic roll ──────────────────────────
       Each card has a fixed latitude (φ) on the sphere so cards are spread
       in true 3D: some above the equator, some below, some on the sides.
       Longitude (θ) rotates with posY so the whole sphere moves as one.  */
    const TO_RAD = Math.PI / 180;
    // Card 0 sits on the equator (φ=0) so it faces the camera cleanly at start.
    // Others are scattered across the sphere at various latitudes.
    const LAT = [0, 32, -28, 42, -35].map(d => d * TO_RAD);
    // Fixed organic roll per card (seeded)
    function seededRng(seed) {
      let s = seed | 0;
      return () => { s = (Math.imul(s, 1664525) + 1013904223) | 0; return (s >>> 0) / 0xFFFFFFFF; };
    }
    const ROLL = CARDS.map((_, i) => {
      const r = seededRng(i * 6271 + 3491);
      return (r() - 0.5) * 24; // ±12° roll
    });

    /* ── Continuous position state ── */
    let posY = 0;
    let velY = 0;
    let rafId = null;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function smoothstep(t)  { return t * t * (3 - 2 * t); }

    /* ── Transform function ──
       st = smoothstep(abs):  0 = active (front, face-on), 1 = sphere surface.
       Position lerps from (0,0,0) → sphere surface as card leaves active slot.
       Rotation lerps from face-on → outward-facing as card leaves active slot.
       Because ALL cards' theta = (i−pos)×2π/N updates every frame, the whole
       sphere rotates as one rigid unit while the front card is always flat.  */
    function applyTransforms(pos) {
      const vw = innerWidth;
      const R  = Math.min(vw * 0.82, 580);

      CARDS.forEach((_, i) => {
        let off = i - pos;
        while (off >  N / 2) off -= N;
        while (off < -N / 2) off += N;

        const el    = cardEls[i];
        const phi   = LAT[i % LAT.length];
        const theta = off * (2 * Math.PI / N);
        const abs   = Math.abs(off);
        const st    = smoothstep(Math.min(1, abs)); // 0=active, 1=on sphere

        const cosPhi = Math.cos(phi);
        const sinPhi = Math.sin(phi);

        // Position: active card stays at (0,0,0); others on sphere surface
        const tx = cosPhi * Math.sin(theta) * R * st;
        const ty = sinPhi  * R * st;
        const tz = (cosPhi * Math.cos(theta) - 1) * R * st;
        //   st=0 → (0,0,0) perfectly centered
        //   st=1 → full sphere surface, tz from 0 (front) to −2R (back)

        // Facing (for opacity/blur)
        const facing = cosPhi * Math.cos(theta);

        // Rotation: face-on when active (st=0), outward from sphere when st=1
        const ry = -(theta * 180 / Math.PI) * 0.45 * st;
        const rx = -(phi   * 180 / Math.PI) * 0.45 * st;

        // Scale: 1.0 at active, 0.9 on sphere (active card is largest)
        const scale   = lerp(1.0, 0.9, st);
        const opacity = Math.max(0, Math.min(1, facing * 0.9 + 0.15));
        const blur    = Math.max(0, (1 - facing) * 3);

        el.style.transform = [
          `translateX(${tx.toFixed(1)}px)`,
          `translateY(${ty.toFixed(1)}px)`,
          `translateZ(${tz.toFixed(1)}px)`,
          `rotateX(${rx.toFixed(1)}deg)`,
          `rotateY(${ry.toFixed(1)}deg)`,
          `rotateZ(${ROLL[i].toFixed(1)}deg)`,
          `scale(${scale.toFixed(3)})`,
        ].join(' ');
        el.style.opacity = opacity.toFixed(3);
        el.style.filter  = blur < 0.1 ? 'none' : `blur(${blur.toFixed(1)}px)`;
        el.style.zIndex  = abs < 0.5 ? '20' : String(Math.max(1, Math.round(facing * 10 + 5)));
        el.classList.toggle('is-active', abs < 0.5);
      });

      const idx = (((Math.round(pos) % N) + N) % N);
      titleEl.textContent   = CARDS[idx].title;
      counterEl.textContent = `${String(idx + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
      drawScrubber(pos);
    }

    /* ── Animation loop with inertia + snap ── */
    function loop() {
      velY *= 0.90;
      posY += velY;

      // Spring snap toward nearest integer when velocity is small
      const target = Math.round(posY);
      if (Math.abs(velY) < 0.02) {
        const spring = (target - posY) * 0.10;
        posY += spring;
        if (Math.abs(velY) < 0.0003 && Math.abs(posY - target) < 0.001) {
          posY  = ((target % N) + N) % N;
          velY  = 0;
          applyTransforms(posY);
          rafId = null;
          return;
        }
      }

      applyTransforms(posY);
      rafId = requestAnimationFrame(loop);
    }

    function kick() {
      if (!rafId) rafId = requestAnimationFrame(loop);
    }

    /* ── Scrubber canvas ── */
    const scrubEl = document.getElementById('scrubber');
    const sc      = document.createElement('canvas');
    scrubEl.appendChild(sc);
    const DPR = Math.min(devicePixelRatio, 2);

    function resizeScrubber() {
      sc.width  = innerWidth * DPR;
      sc.height = 65 * DPR;
      sc.style.width  = innerWidth + 'px';
      sc.style.height = '65px';
    }
    resizeScrubber();
    const sctx = sc.getContext('2d');

    function drawScrubber(pos) {
      const w = sc.width, h = sc.height;
      sctx.clearRect(0, 0, w, h);

      const SPACING = 7  * DPR;
      const LINE_H  = 26 * DPR;
      const LINE_W  = 1  * DPR;
      const cy      = h / 2;
      const total   = Math.ceil(w / SPACING) + 2;

      // Lines scroll with posY
      const rawShift = -(pos / N) * w;
      const shift    = ((rawShift % SPACING) + SPACING) % SPACING;

      // Active card maps to screen center (w/2)
      const activeX = w / 2;

      for (let i = -1; i < total; i++) {
        const x = i * SPACING + shift;
        // Distance from this line to the "active" center position in card-space
        const lineCardPos = ((i * SPACING + shift - activeX) / w) * N + pos;
        const nearest     = Math.round(lineCardPos);
        const distToCard  = Math.abs(lineCardPos - nearest);
        const hl          = Math.max(0, 1 - distToCard * N * 0.9);

        const dark   = 200;
        const bright = 100;
        const col    = Math.round(dark - (dark - bright) * hl);
        sctx.fillStyle = `rgb(${col},${col},${col})`;
        sctx.fillRect(x - LINE_W / 2, cy - LINE_H / 2, LINE_W, LINE_H);
      }
    }

    /* ── Input: stage drag ── */
    // How many card-widths per pixel of drag
    const dragK = () => 1 / (innerWidth * 0.60);

    let stageTouch = null;
    stage.addEventListener('touchstart', e => {
      stageTouch = e.touches[0].clientX;
      velY = 0;
    }, { passive: true });
    stage.addEventListener('touchmove', e => {
      if (stageTouch === null) return;
      const dx   = e.touches[0].clientX - stageTouch;
      const dPos = -dx * dragK();
      velY  = velY * 0.5 + dPos * 0.5;
      posY += dPos;
      stageTouch = e.touches[0].clientX;
      applyTransforms(posY);
    }, { passive: true });
    stage.addEventListener('touchend', () => { stageTouch = null; kick(); }, { passive: true });

    let stageMouse = null;
    stage.addEventListener('mousedown', e => { stageMouse = e.clientX; velY = 0; });

    /* ── Input: scrubber drag (horizontal only) ── */
    const scrubK = () => 1 / (innerWidth * 0.45);

    let scrubTouch = null;
    scrubEl.addEventListener('touchstart', e => {
      e.stopPropagation();
      scrubTouch = e.touches[0].clientX;
      velY = 0;
    }, { passive: true });
    scrubEl.addEventListener('touchmove', e => {
      if (scrubTouch === null) return;
      const dx   = e.touches[0].clientX - scrubTouch;
      const dPos = -dx * scrubK();
      velY  = velY * 0.5 + dPos * 0.5;
      posY += dPos;
      scrubTouch = e.touches[0].clientX;
      applyTransforms(posY);
    }, { passive: true });
    scrubEl.addEventListener('touchend', () => { scrubTouch = null; kick(); }, { passive: true });

    let scrubMouse = null;
    scrubEl.addEventListener('mousedown', e => { scrubMouse = e.clientX; velY = 0; });

    /* ── Single consolidated mouse handlers on window ── */
    window.addEventListener('mousemove', e => {
      if (stageMouse !== null) {
        const dx   = e.clientX - stageMouse;
        const dPos = -dx * dragK();
        velY  = velY * 0.5 + dPos * 0.5;
        posY += dPos;
        stageMouse = e.clientX;
        applyTransforms(posY);
      } else if (scrubMouse !== null) {
        const dx   = e.clientX - scrubMouse;
        const dPos = -dx * scrubK();
        velY  = velY * 0.5 + dPos * 0.5;
        posY += dPos;
        scrubMouse = e.clientX;
        applyTransforms(posY);
      }
    });
    window.addEventListener('mouseup', () => {
      if (stageMouse !== null || scrubMouse !== null) kick();
      stageMouse = null;
      scrubMouse = null;
    });

    /* ── Wheel ── */
    window.addEventListener('wheel', e => {
      e.preventDefault();
      velY += (e.deltaX + e.deltaY) * 0.004;
      kick();
    }, { passive: false });

    /* ── Keyboard ── */
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { velY += 0.12; kick(); }
      if (e.key === 'ArrowLeft')  { velY -= 0.12; kick(); }
    });

    /* ── Click active card → navigate ── */
    stage.addEventListener('click', e => {
      if (Math.abs(velY) > 0.03) return;
      const card = e.target.closest('.card');
      if (!card || !card.classList.contains('is-active')) return;
      const idx = cardEls.indexOf(card);
      if (idx >= 0 && CARDS[idx].href) location.href = CARDS[idx].href;
    });

    /* ── Resize ── */
    window.addEventListener('resize', () => {
      resizeScrubber();
      applyTransforms(posY);
    });

    /* ── Init ── */
    applyTransforms(0);

  })();
  </script>
</body>
</html>
