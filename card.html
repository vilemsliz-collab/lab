<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./design-system.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 32px;
  background: #e8e8e8;
  padding: 60px 20px;
}
.card-wrap {
  perspective: 800px;
  flex-shrink: 0;
}
.card {
  width: min(92vw, 364px);
  aspect-ratio: 364 / 555;
  border-radius: var(--space-2);       /* 8px */
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: var(--inset-lg);            /* 24px */
  position: relative;
  background: #d9d9d9;
  transform-style: preserve-3d;
  transition: none;
  will-change: transform;
}
.card-bg {
  position: absolute; inset: 0; z-index: 0;
  width: 100%; height: 100%; object-fit: cover; display: block;
}
#ghost-canvas {
  position: absolute; inset: 0; z-index: 3;
  width: 100%; height: 100%;
  pointer-events: none;
}
.card-overlay {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55));
}
.card-content {
  position: relative; z-index: 4;
  display: flex; flex-direction: column; gap: var(--stack-md);
  color: #fff;
}

/* Word reveal */
.word {
  display: inline-block;
  opacity: 0;
  filter: blur(var(--blur, 8px));
  transform: translateY(var(--y, 8px));
  transition:
    opacity var(--dur, 400ms) ease,
    filter   var(--dur, 400ms) ease,
    transform var(--dur, 400ms) ease;
}
.word.visible {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}

/* Controls */
.controls {
  width: min(92vw, 364px);
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(16px);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  font-family: monospace;
  font-size: 11px;
  color: #666;
}
.ctrl-row {
  display: flex; align-items: center; gap: 10px;
}
.ctrl-label { width: 80px; flex-shrink: 0; letter-spacing: 0.05em; }
.ctrl-val   { width: 36px; text-align: right; flex-shrink: 0; color: #333; }
.ctrl-row input[type=range] {
  flex: 1; height: 3px; appearance: none; -webkit-appearance: none;
  background: rgba(0,0,0,0.12); border-radius: 2px; outline: none; cursor: pointer;
}
.ctrl-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.2);
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.replay-btn {
  margin-top: 4px;
  width: 100%; padding: 10px;
  border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
  background: #1c1b1f; color: #fff;
  font-family: monospace; font-size: 12px; letter-spacing: 0.08em;
  cursor: pointer; transition: opacity 0.15s;
}
.replay-btn:hover { opacity: 0.8; }

a.back    { position:fixed;top:20px;left:20px;font-size:12px;color:#999;text-decoration:none;font-family:monospace; }
a.ds-link { position:fixed;top:20px;right:20px;font-size:12px;color:#999;text-decoration:none;font-family:monospace; }
a.back:hover, a.ds-link:hover { color:#333; }
</style>
</head>
<body>
<a class="back" href="./index.html">← lab</a>
<a class="ds-link" href="./design-system.html">design system →</a>

<div class="card-wrap">
<div class="card" id="card">
  <img id="card-img" class="card-bg" src="https://picsum.photos/600/800" crossorigin="anonymous" alt="">
  <canvas id="ghost-canvas"></canvas>
  <div class="card-overlay"></div>
  <div class="card-content">
    <p class="type-label-medium" id="line1">Lead Brand Designer</p>
    <p class="type-headline-medium" id="line2">Brand for showmore new 360 agency on the market</p>
  </div>
</div>
</div>

<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">layers</span>
    <input type="range" id="s-glayers" min="3" max="16" step="1" value="8">
    <span class="ctrl-val" id="v-glayers">8</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">spreadX</span>
    <input type="range" id="s-gsx" min="0" max="4" step="0.1" value="1.4">
    <span class="ctrl-val" id="v-gsx">1.4</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">spreadY</span>
    <input type="range" id="s-gsy" min="0" max="4" step="0.1" value="1.4">
    <span class="ctrl-val" id="v-gsy">1.4</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">g·opacity</span>
    <input type="range" id="s-gopa" min="0.01" max="0.25" step="0.01" value="0.07">
    <span class="ctrl-val" id="v-gopa">0.07</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">blend</span>
    <select id="s-gblend" style="flex:1;font-family:monospace;font-size:11px;border:1px solid rgba(0,0,0,0.12);border-radius:4px;padding:3px 6px;background:#fff;color:#333;cursor:pointer;">
      <option value="multiply" selected>multiply</option>
      <option value="screen">screen</option>
      <option value="overlay">overlay</option>
      <option value="hard-light">hard-light</option>
    </select>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">max tilt</span>
    <input type="range" id="s-tmax" min="1" max="20" step="0.5" value="8">
    <span class="ctrl-val" id="v-tmax">8°</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">radius</span>
    <input type="range" id="s-tradius" min="50" max="800" value="400">
    <span class="ctrl-val" id="v-tradius">400px</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">stiffness</span>
    <input type="range" id="s-tstiff" min="0.01" max="0.4" step="0.01" value="0.1">
    <span class="ctrl-val" id="v-tstiff">0.1</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">damping</span>
    <input type="range" id="s-tdamp" min="0.5" max="0.98" step="0.01" value="0.75">
    <span class="ctrl-val" id="v-tdamp">0.75</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">stagger</span>
    <input type="range" id="s-stagger" min="20" max="200" value="70">
    <span class="ctrl-val" id="v-stagger">70ms</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">duration</span>
    <input type="range" id="s-dur" min="100" max="1200" value="797">
    <span class="ctrl-val" id="v-dur">797ms</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">blur</span>
    <input type="range" id="s-blur" min="0" max="24" value="8">
    <span class="ctrl-val" id="v-blur">8px</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">y offset</span>
    <input type="range" id="s-y" min="0" max="40" value="8">
    <span class="ctrl-val" id="v-y">8px</span>
  </div>
  <div style="display:flex;gap:8px;margin-top:4px;">
    <button class="replay-btn" id="replayBtn" style="flex:1">replay reveal</button>
    <button class="replay-btn" id="copyBtn" style="flex:1;background:#fff;color:#333;border-color:rgba(0,0,0,0.15)">copy values</button>
  </div>
</div>

<script>
const CFG = { stagger: 70, dur: 797, blur: 8, y: 8 };

function wrapWords(el) {
  el.innerHTML = el.textContent.trim().split(/\s+/).map(w =>
    `<span class="word">${w}</span>`
  ).join(' ');
}

function applyCSS() {
  document.documentElement.style.setProperty('--blur', CFG.blur + 'px');
  document.documentElement.style.setProperty('--y', CFG.y + 'px');
  document.documentElement.style.setProperty('--dur', CFG.dur + 'ms');
}

function reveal() {
  const words = document.querySelectorAll('.word');
  words.forEach(w => w.classList.remove('visible'));
  applyCSS();
  words.forEach((w, i) => {
    setTimeout(() => w.classList.add('visible'), i * CFG.stagger);
  });
}

// Init
['line1','line2'].forEach(id => wrapWords(document.getElementById(id)));
reveal();

// Sliders
[
  ['s-stagger','v-stagger','stagger','ms'],
  ['s-dur','v-dur','dur','ms'],
  ['s-blur','v-blur','blur','px'],
  ['s-y','v-y','y','px'],
].forEach(([sid, vid, key, unit]) => {
  const slider = document.getElementById(sid);
  const val    = document.getElementById(vid);
  slider.addEventListener('input', () => {
    CFG[key] = +slider.value;
    val.textContent = slider.value + unit;
  });
});

document.getElementById('replayBtn').addEventListener('click', reveal);

document.getElementById('copyBtn').addEventListener('click', () => {
  const btn = document.getElementById('copyBtn');
  const values = {
    reveal: { stagger: CFG.stagger, duration: CFG.dur, blur: CFG.blur, y: CFG.y },
    tilt:   { max: TILT.max, radius: TILT.radius, stiffness: TILT.stiffness, damping: TILT.damping }
  };
  navigator.clipboard.writeText(JSON.stringify(values, null, 2)).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = 'copy values'; }, 1500);
  });
});

[
  ['s-tmax',    'v-tmax',    'max',       '°',   1  ],
  ['s-tradius', 'v-tradius', 'radius',    'px',  1  ],
  ['s-tstiff',  'v-tstiff',  'stiffness', '',    100],
  ['s-tdamp',   'v-tdamp',   'damping',   '',    100],
].forEach(([sid, vid, key, unit, prec]) => {
  const sl = document.getElementById(sid);
  const vl = document.getElementById(vid);
  sl.addEventListener('input', () => {
    TILT[key] = +sl.value;
    vl.textContent = (+sl.value).toFixed(prec > 1 ? 2 : 0) + unit;
  });
});

/* ── Card tilt ── */
const cardEl = document.getElementById('card');
const TILT = { max: 8, radius: 400, stiffness: 0.1, damping: 0.75 };

let tiltRx = 0, tiltRy = 0, tiltVx = 0, tiltVy = 0, tiltTx = 0, tiltTy = 0;

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const isMobile = () => navigator.maxTouchPoints > 0;

/* Desktop — mouse */
document.addEventListener('mousemove', e => {
  if (isMobile()) return;
  const r  = cardEl.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const falloff = Math.max(0, 1 - dist / TILT.radius);
  tiltTy =  (dx / (r.width  / 2)) * TILT.max * falloff;
  tiltTx = -(dy / (r.height / 2)) * TILT.max * falloff;
});

/* Mobile — gyroscope */
function attachGyro() {
  window.addEventListener('deviceorientation', e => {
    const gamma = e.gamma ?? 0; // left/right  -90→90
    const beta  = e.beta  ?? 0; // front/back  -180→180
    tiltTy = clamp( (gamma / 30) * TILT.max, -TILT.max, TILT.max);
    tiltTx = clamp(((beta - 45) / 30) * TILT.max, -TILT.max, TILT.max);
  });
}

if (isMobile()) {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ needs a user-gesture permission
    const permBtn = document.createElement('button');
    permBtn.textContent = 'enable tilt';
    permBtn.style.cssText = [
      'position:fixed','bottom:20px','right:20px',
      'padding:10px 16px','border-radius:8px','border:1px solid rgba(0,0,0,0.15)',
      'background:#1c1b1f','color:#fff','font-family:monospace','font-size:12px',
      'cursor:pointer','z-index:999'
    ].join(';');
    document.body.appendChild(permBtn);
    permBtn.addEventListener('click', () => {
      DeviceOrientationEvent.requestPermission().then(state => {
        if (state === 'granted') { attachGyro(); }
        permBtn.remove();
      }).catch(() => permBtn.remove());
    });
  } else {
    attachGyro();
  }
}

/* ── Ghost canvas ── */
const GHOST = { layers: 8, spreadX: 1.4, spreadY: 1.4, opacity: 0.07, blend: 'multiply' };
const ghostCanvas = document.getElementById('ghost-canvas');
const gCtx = ghostCanvas.getContext('2d');
const cardImg = document.getElementById('card-img');

const offscreen = document.createElement('canvas');
const offCtx    = offscreen.getContext('2d');

function buildOffscreen() {
  const W = cardEl.offsetWidth, H = cardEl.offsetHeight;
  ghostCanvas.width = offscreen.width  = W;
  ghostCanvas.height = offscreen.height = H;
  offCtx.clearRect(0, 0, W, H);
  offCtx.drawImage(cardImg, 0, 0, W, H);
  const grad = offCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0.55, 'rgba(0,0,0,0)');
  grad.addColorStop(1,    'rgba(0,0,0,0.55)');
  offCtx.fillStyle = grad;
  offCtx.fillRect(0, 0, W, H);
}
cardImg.addEventListener('load', buildOffscreen);
window.addEventListener('resize', buildOffscreen);

function drawGhosts() {
  const mag = Math.abs(tiltRx) + Math.abs(tiltRy);
  const W = ghostCanvas.width, H = ghostCanvas.height;
  if (mag < 0.3) { gCtx.clearRect(0, 0, W, H); return; }
  gCtx.clearRect(0, 0, W, H);
  gCtx.globalCompositeOperation = GHOST.blend;
  gCtx.globalAlpha = GHOST.opacity;
  for (let i = 0; i < GHOST.layers; i++) {
    const scalar = GHOST.layers > 1 ? i / (GHOST.layers - 1) : 0;
    const dx = tiltRy * GHOST.spreadX * scalar;
    const dy = tiltRx * GHOST.spreadY * scalar;
    gCtx.drawImage(offscreen, dx, dy, W, H);
  }
}

(function tiltLoop() {
  tiltVx += (tiltTx - tiltRx) * TILT.stiffness;
  tiltVy += (tiltTy - tiltRy) * TILT.stiffness;
  tiltVx *= TILT.damping;
  tiltVy *= TILT.damping;
  tiltRx += tiltVx;
  tiltRy += tiltVy;
  cardEl.style.transform = `rotateX(${tiltRx.toFixed(3)}deg) rotateY(${tiltRy.toFixed(3)}deg)`;
  drawGhosts();
  requestAnimationFrame(tiltLoop);
})();

[
  ['s-glayers', 'v-glayers', 'layers',  '',    v => Math.round(v)],
  ['s-gsx',     'v-gsx',     'spreadX', '',    v => v],
  ['s-gsy',     'v-gsy',     'spreadY', '',    v => v],
  ['s-gopa',    'v-gopa',    'opacity', '',    v => v],
].forEach(([sid, vid, key, , fmt]) => {
  const sl = document.getElementById(sid);
  const vl = document.getElementById(vid);
  sl.addEventListener('input', () => { GHOST[key] = +sl.value; vl.textContent = fmt(+sl.value); });
});
document.getElementById('s-gblend').addEventListener('change', e => { GHOST.blend = e.target.value; });
</script>
</body>
</html>
