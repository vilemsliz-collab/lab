<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap');

:root {
  --font-brand: 'Google Sans Flex', 'Google Sans', system-ui, sans-serif;
  --type-label-medium-size: 12px; --type-label-medium-lh: 16px; --type-label-medium-ls: 0.5px; --type-label-medium-weight: 500;
  --type-headline-medium-size: 28px; --type-headline-medium-lh: 36px; --type-headline-medium-ls: 0px; --type-headline-medium-weight: 400;
}
.type-label-medium  { font-family:var(--font-brand);font-size:var(--type-label-medium-size);line-height:var(--type-label-medium-lh);letter-spacing:var(--type-label-medium-ls);font-weight:var(--type-label-medium-weight); }
.type-headline-medium { font-family:var(--font-brand);font-size:var(--type-headline-medium-size);line-height:var(--type-headline-medium-lh);letter-spacing:var(--type-headline-medium-ls);font-weight:var(--type-headline-medium-weight); }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  background: #e8e8e8;
}
.card {
  width: min(92vw, 364px);
  aspect-ratio: 364 / 555;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 24px;
  position: relative;
  background: #d9d9d9;
}
.card-bg {
  position: absolute; inset: 0;
  background: #d9d9d9 url('https://www.figma.com/api/mcp/asset/6d5a8ac8-6b4a-41d5-a732-a5b83f3a7841') center/cover;
}
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 65%, rgba(0,0,0,0.55));
}
.card-content {
  position: relative;
  display: flex; flex-direction: column; gap: 16px;
  color: #fff;
}
a.back    { position:fixed;top:20px;left:20px;font-size:12px;color:#999;text-decoration:none;font-family:monospace; }
a.ds-link { position:fixed;top:20px;right:20px;font-size:12px;color:#999;text-decoration:none;font-family:monospace; }
a.back:hover, a.ds-link:hover { color:#333; }
</style>
</head>
<body>
<a class="back" href="./index.html">← lab</a>
<a class="ds-link" href="./design-system.html">design system →</a>
<div class="card">
  <div class="card-bg"></div>
  <div class="card-overlay"></div>
  <div class="card-content">
    <p class="type-label-medium">Lead Brand Designer</p>
    <p class="type-headline-medium">Brand for showmore new 360 agency on the market</p>
  </div>
</div>
</body>
</html>
